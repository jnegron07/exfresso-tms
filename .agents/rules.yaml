## 🚀 Restricciones de Deploy

### Vercel
```yaml
REQUIRED:
  - next.config.js configurado
  - Environment variables en .env.local
  - Auto-deploy en merge a main
  - Preview deployments para PR
  
NOT_ALLOWED:
  - Llamadas a APIs no-SSR en build time
  - Secrets en código (usar .env.local)
```


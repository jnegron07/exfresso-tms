## 🎯 Restricciones por Pantalla

### Dashboard
```yaml
MUST_HAVE:
  - 4 KPI cards (Activos, Llegando, Cotizaciones, Pendientes)
  - Mapa mundial con marcadores animados (Mapbox GL)
  - Panel de "Acción Requerida" (3-5 items)
  - Activity Feed (últimos eventos)
  
BLOCKED:
  - Modales de resumen (usar popover en mapa)
  - Formularios en dashboard (usar navegación)
  - Más de 4 secciones principales
```

### Búsqueda de Rutas (⭐ PANTALLA ESTRELLA)
```yaml
MUST_HAVE:
  - Formulario simple: Origen, Destino, Peso, Volumen, Modo, Fechas
  - Animación de carga de 7 segundos (globo pulsante)
  - 5-8 resultados como tarjetas clasificadas
  - Desglose de precios expandible
  - CTAs: "Reservar", "Generar Cotización"

MUST_NOT_HAVE:
  - Toda la forma en un modal
  - Pestañas en resultados
  - Resultados en tabla (usar tarjetas visuales)
```

### Detalle de Envío
```yaml
MUST_HAVE:
  - Timeline visual de ruta (tramo por tramo)
  - Panel de rastreo con eventos + forma "Agregar Nota"
  - Libro contable colapsable (costos vs ingresos)
  - Panel de documentos colapsable
  
MUST_NOT_HAVE:
  - 20+ pestañas (usar paneles colapsables)
  - Modales para detalles de tramo (expandir inline)
  - Separación de layouts por sección
```

### Carga de Tarjetas
```yaml
MUST_HAVE:
  - Zona drag-and-drop grande
  - Preview de documento + datos extraídos lado a lado
  - Indicadores de confianza (✅ alto, ⚠️ revisar)
  - Mapeo manual de campos si es necesario
  - Resumen antes de guardar
  
MUST_NOT_HAVE:
  - Cargar y procesar escondido
  - Sin preview de extracción
  - Sin opción de mapeo manual
```


## 🎨 Restricciones de Diseño

### Paleta Obligatoria
```yaml
PRIMARY:    '#0D9488'  (Teal - botones, acentos)
SECONDARY:  '#1B2A4A'  (Navy - sidebar, encabezados)
BACKGROUND: '#FAFAFA'  (Light gray)
SUCCESS:    '#10B981'  (Green)
WARNING:    '#F59E0B'  (Amber)
ERROR:      '#EF4444'  (Red)

FONTS:
  - Display: Satoshi (no Inter, no Arial, no Roboto)
  - Body: Plus Jakarta Sans
```

### Anti-Patrones Bloqueados
```yaml
BLOCKED_PATTERNS:
  - Modales superpuestos (usar inline expansion o new page)
  - Formularios con 10+ campos en una vista (usar wizard)
  - Pestañas anidadas profundas (revelar progresivamente)
  - Densidad extrema de información (usar collapsibles)
  - Entrada de datos sin asistencia IA
  - Fondos sólidos planos (usar gradientes sutiles)
  - Sin espacio en blanco (ser generoso con padding)

REQUIRED:
  - Revelación progresiva en toda la UI
  - Botones CTA claros en cada pantalla
  - Microcopy amigable (no jerga técnica)
  - Animaciones suaves (Framer Motion)
  - Estados de carga (spinners, skeletons)
  - Estados vacíos (ilustraciones + mensajes)
```


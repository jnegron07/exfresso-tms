## 📁 Restricciones de Estructura

### Estructura de Carpetas (INMUTABLE)
```
app/
├── (auth)/          # Rutas de autenticación
├── (dashboard)/     # Rutas protegidas
│   ├── layout.tsx   # Sidebar + topbar
│   └── [feature]/   # Por característica
├── api/             # API routes
└── globals.css

components/
├── ui/              # shadcn/ui (NO crear custom buttons)
├── layout/          # Sidebar, topbar, etc
├── [feature]/       # Agrupar por característica
└── common/          # Reutilizables

lib/
├── mock-data/       # Fixtures JSON
├── api/             # Client, endpoints
├── stores/          # Zustand stores
├── types/           # TypeScript interfaces
└── utils/           # Helpers, validators
```

**Transgresión:** Crear archivos fuera de esta estructura requiere aprobación en `decisions.log`.


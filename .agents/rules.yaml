## 🔐 Restricciones de Seguridad

### Autenticación
```yaml
IMPLEMENTATION:
  - NextAuth.js con credenciales mock
  - JWT para sesiones
  - Auto-refresh en token expiry
  - Redirect a login en 401/403
  
DEMO_CREDENTIALS:
  - Email: user@exfresso.example
  - Password: demo123
  - (más en mock-data/users.ts)
```

### Control de Acceso
```yaml
ROLES:
  - admin: acceso total
  - operations-manager: create/edit envíos, finanzas, rastreo
  - agent: lectura de asignados, actualizar estado

ENFORCEMENT:
  - Mostrar/ocultar UI según rol
  - Validar en API routes
  - Log de accesos (auditoría mock)
```


## 🔄 Restricciones de Datos

### Fuentes de Datos (PERMITIDAS)
```yaml
ALLOWED:
  - lib/mock-data/*.ts (fixtures JSON)
  - app/api/*/route.ts (mock API responses)
  - Zustand stores (estado global)
  - React Query cache (estado del servidor)

BLOCKED:
  - Hardcoded en componentes
  - localStorage directamente (usar Zustand)
  - Variables globales (use Zustand)
  - APIs externas reales
```

### Formato de Datos
```yaml
REQUIRED_FIELDS_PER_ENTITY:
  Shipment: id, shipmentNumber, origin, destination, mode, status, legs[], trackingEvents[], ledgerEntries[], documents[], createdAt, updatedAt
  RateCard: id, type, origin, destination, carrier, ratePerKg, ratePerCBM, currency, validFrom, validTo
  Partner: id, companyName, country, ports[], services[], connectionStatus, sharedRateCards[]
  
TIMESTAMP_FORMAT: ISO 8601 (2024-04-22T10:00:00Z)
CURRENCY_CODES: ISO 4217 (USD, EUR, GBP, CNY, etc)
PORT_CODES: IATA 3-letter codes (USLAX, DEHAM, CNSHA, etc)
MODE_VALUES: 'air' | 'ocean' | 'trucking' | 'multimodal'
```


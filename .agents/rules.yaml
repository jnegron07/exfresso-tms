# Reglas para Agentes — Exfresso
**Antigravity / Claude Code Rules**

---

## 📋 Restricciones Globales

### Código Propietario
```yaml
BLOCKED:
  - Acceso a código Haskell del backend
  - Referencias a PureScript anterior
  - Datos reales del motor de ruteo
  - APIs externas de productivas (solo mock)

ALLOWED:
  - Generación de código en capa de aplicación (UI, lógica)
  - Simulación del motor de ruteo con fixtures JSON
  - Uso de datos mock realistas
```

### Arquitectura Permitida
```yaml
MUST_USE:
  - Next.js 14+ (App Router)
  - Tailwind CSS 3.x
  - shadcn/ui (no Material-UI, no Bootstrap)
  - Zustand (no Redux, no Jotai)
  - React Query (TanStack)
  - React Hook Form + Zod
  - Framer Motion (animaciones)

MUST_AVOID:
  - Componentes personalizados (use shadcn)
  - Inline CSS (use Tailwind)
  - API calls a servicios externos
  - useReducer (use Zustand)
  - prop drilling profundo
```

### Convenciones de Código
```yaml
NAMING:
  components: PascalCase.tsx
  utils: camelCase.ts
  api: route.ts
  types: export interface I{EntityName}
  stores: use{EntityName}Store

IMPORTS_ORDER:
  1. React imports
  2. External libraries
  3. Components (@/components)
  4. Utils/Types (@/lib)
  5. Styles (last)

TYPESCRIPT:
  - Always use explicit types
  - No 'any' — use 'unknown' if needed
  - Export interfaces with I prefix
  - Use Zod for validation
```


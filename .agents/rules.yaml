## 🔄 Flujo de Aprobación para Excepciones

Si necesitas violar una regla:

1. Documenta en `decisions.log` (crear en `.agents/artifacts/`)
   ```
   DECISION: [Qué quieres hacer]
   REASON: [Por qué]
   TRADE_OFF: [Qué se pierde]
   APPROVAL: [user/date]
   ```

2. Referencia decisión en código (comentario):
   ```typescript
   // See decisions.log: DECISION_ID
   ```

3. Notifica en prompt: "Esto requiere excepción aprobada"

